name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/docker/app-casa-do-licitante"
            REPO_URL="https://github.com/ROBERTOSYLAU/app-casa-do-licitante.git"

            echo "==> [$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting deployment"

            # First-time setup: clone repo if not exists
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> First-time setup: cloning repository..."
              mkdir -p "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
              echo "==> Clone complete."
            fi

            cd "$APP_DIR"

            # Pull latest code
            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart containers
            echo "==> Rebuilding containers..."
            docker compose up -d --build --no-deps web worker

            # Run migrations
            echo "==> Running database migrations..."
            docker exec casa-web sh -c 'cd /app && pnpm --filter=@casa/db exec prisma migrate deploy --schema prisma/schema.prisma'

            echo "==> Deployment complete!"
            docker compose ps
